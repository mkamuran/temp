services:
  - type: web
    name: chart-shape-finder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --timeout 180
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: MAX_SYMBOLS
        value: 80
      - key: YFINANCE_BATCH_SIZE
        value: 80
